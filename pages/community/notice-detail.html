<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 | PETBALANCE</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/nav.css" />
  <link rel="stylesheet" href="../../css/sections.css" />
  <style>
    .page-hero {
      height: 200px;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)) center/cover no-repeat;
      background-color: #1B3A5C;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: var(--nav-height);
    }
    .page-hero h1 { font-size: var(--size-2xl); color: white; font-weight: 700; }
    .breadcrumb { background: #f5f5f5; border-bottom: 1px solid var(--color-border); }
    .breadcrumb__inner {
      max-width: var(--max-width); margin: 0 auto;
      padding: 0.75rem 5%; display: flex; align-items: center; gap: 0.5rem;
    }
    .breadcrumb a, .breadcrumb span { font-size: var(--size-xs); color: var(--color-text-sub); }
    .breadcrumb .sep { color: var(--color-border); }
    .breadcrumb .current { color: var(--color-primary); font-weight: 500; }
    .sub-nav { background: white; border-bottom: 1px solid var(--color-border); }
    .sub-nav__inner { max-width: var(--max-width); margin: 0 auto; padding: 0 5%; display: flex; }
    .sub-nav__link {
      padding: 1rem 1.5rem; font-size: var(--size-sm);
      color: var(--color-text-sub); border-bottom: 2px solid transparent;
      transition: var(--transition-base); white-space: nowrap;
    }
    .sub-nav__link:hover, .sub-nav__link.active {
      color: var(--color-primary); border-bottom-color: var(--color-primary);
    }

    /* 상세 페이지 */
    .detail-section { padding: 4rem 0 6rem; background: white; }
    .detail-wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    /* 헤더 */
    .detail-header {
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--color-primary);
      margin-bottom: 2.5rem;
    }
    .detail-category {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: #EEF1F5;
      color: var(--color-primary);
      font-size: var(--size-xs);
      font-weight: 600;
      border-radius: var(--radius-sm);
      margin-bottom: 0.75rem;
    }
    .detail-title {
      font-size: var(--size-xl);
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.3;
      margin-bottom: 1rem;
      word-break: keep-all;
    }
    .detail-meta {
      font-size: var(--size-xs);
      color: var(--color-text-light);
      font-family: var(--font-en);
    }

    /* 본문 블록 렌더링 */
    .detail-body { line-height: 1.9; }
    .detail-body p {
      font-size: var(--size-base);
      color: var(--color-text);
      margin-bottom: 1rem;
      word-break: keep-all;
    }
    .detail-body h1 { font-size: var(--size-xl); font-weight: 700; margin: 2rem 0 1rem; }
    .detail-body h2 { font-size: var(--size-lg); font-weight: 700; margin: 1.75rem 0 0.75rem; }
    .detail-body h3 { font-size: var(--size-md); font-weight: 600; margin: 1.5rem 0 0.5rem; }
    .detail-body ul { padding-left: 1.5rem; margin-bottom: 1rem; list-style: disc; }
    .detail-body ol { padding-left: 1.5rem; margin-bottom: 1rem; list-style: decimal; }
    .detail-body li { font-size: var(--size-base); color: var(--color-text); margin-bottom: 0.4rem; }
    .detail-body hr { border: none; border-top: 1px solid var(--color-border); margin: 2rem 0; }
    .detail-body blockquote {
      border-left: 4px solid var(--color-primary);
      padding: 0.75rem 1.25rem;
      background: var(--color-bg-section);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 1.5rem 0;
      color: var(--color-text-sub);
    }
    .detail-body img {
      max-width: 100%;
      border-radius: var(--radius-md);
      margin: 1.5rem 0;
    }

    /* 하단 네비 */
    .detail-nav {
      margin-top: 3rem;
      border-top: 1px solid var(--color-border);
    }
    .detail-nav__item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: var(--size-sm);
      color: var(--color-text-sub);
      cursor: pointer;
      transition: var(--transition-base);
    }
    .detail-nav__item:hover { color: var(--color-primary); }
    .detail-nav__label {
      font-weight: 600;
      color: var(--color-text-light);
      min-width: 40px;
      font-size: var(--size-xs);
    }
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.65rem 1.5rem;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: var(--size-sm);
      color: var(--color-text-sub);
      transition: var(--transition-base);
    }
    .detail-back:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--color-text-light);
    }
  </style>
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="../../index.html" class="nav__logo">
        <img src="../../assets/images/logo.png" alt="PetBalance" style="height:44px;width:auto;"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span style="display:none;font-family:var(--font-en);font-size:1.35rem;font-weight:700;color:var(--color-primary);">PetBalance</span>
      </a>
      <ul class="nav__menu">
        <li class="nav__item"><a href="../../pages/petbalance/" class="nav__link">PETBALANCE</a></li>
        <li class="nav__item"><a href="../../pages/pet-product/" class="nav__link">PRODUCT</a></li>
        <li class="nav__item"><a href="../../pages/pet-service/" class="nav__link">SERVICE</a></li>
        <li class="nav__item"><a href="../../pages/pet-advisor/" class="nav__link">ADVISOR</a></li>
        <li class="nav__item"><a href="../../pages/community/" class="nav__link active">COMMUNITY</a></li>
        <li class="nav__item"><a href="../../pages/ethics/" class="nav__link">ETHICS</a></li>
      </ul>
      <div class="nav__controls">
        <button class="nav__lang">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          KOR
        </button>
        <button class="nav__hamburger" id="hamburger">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <div class="page-hero"><h1>COMMUNITY</h1></div>

  <div class="breadcrumb">
    <div class="breadcrumb__inner">
      <a href="../../index.html">🏠</a>
      <span class="sep">›</span>
      <a href="notice.html">COMMUNITY</a>
      <span class="sep">›</span>
      <span class="current">공지사항</span>
    </div>
  </div>

  <div class="sub-nav">
    <div class="sub-nav__inner">
      <a href="notice.html" class="sub-nav__link active">공지사항</a>
    </div>
  </div>

  <section class="detail-section">
    <div class="container">
      <div class="detail-wrap">
        <div id="detailContent" class="loading">불러오는 중...</div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__bottom">
        <span>© 2025 MJ Holdings. All rights reserved.</span>
        <span>사업자등록번호 : 650-88-02820 | 대표 : 송명준</span>
      </div>
    </div>
  </footer>

  <script src="../../js/nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pageId = params.get('id');

    function renderBlock(block) {
      const type = block.type;
      const rich = (arr) => arr?.map(t => {
        let text = t.plain_text;
        if (t.annotations?.bold) text = `<strong>${text}</strong>`;
        if (t.annotations?.italic) text = `<em>${text}</em>`;
        if (t.annotations?.underline) text = `<u>${text}</u>`;
        if (t.annotations?.strikethrough) text = `<s>${text}</s>`;
        if (t.annotations?.code) text = `<code>${text}</code>`;
        return text;
      }).join('') || '';

      switch (type) {
        case 'paragraph':
          return `<p>${rich(block.paragraph.rich_text) || '&nbsp;'}</p>`;
        case 'heading_1':
          return `<h1>${rich(block.heading_1.rich_text)}</h1>`;
        case 'heading_2':
          return `<h2>${rich(block.heading_2.rich_text)}</h2>`;
        case 'heading_3':
          return `<h3>${rich(block.heading_3.rich_text)}</h3>`;
        case 'bulleted_list_item':
          return `<ul><li>${rich(block.bulleted_list_item.rich_text)}</li></ul>`;
        case 'numbered_list_item':
          return `<ol><li>${rich(block.numbered_list_item.rich_text)}</li></ol>`;
        case 'quote':
          return `<blockquote>${rich(block.quote.rich_text)}</blockquote>`;
        case 'divider':
          return `<hr>`;
        case 'image':
          const imgUrl = block.image?.file?.url || block.image?.external?.url || '';
          return imgUrl ? `<img src="${imgUrl}" alt="이미지">` : '';
        default:
          return '';
      }
    }

    async function loadDetail() {
      const el = document.getElementById('detailContent');
      if (!pageId) {
        el.innerHTML = '<p>잘못된 접근입니다.</p>';
        return;
      }

      try {
        const res = await fetch(`/api/notice-detail?id=${pageId}`);
        const data = await res.json();

        const title = data.meta?.properties?.['제목']?.title?.[0]?.plain_text || '';
        const date = data.meta?.properties?.['날짜']?.date?.start || '';
        const category = data.meta?.properties?.['카테고리']?.select?.name || '';
        const blocks = data.blocks?.results || [];

        const bodyHtml = blocks.map(renderBlock).join('');

        el.innerHTML = `
          <div class="detail-header">
            ${category ? `<span class="detail-category">${category}</span>` : ''}
            <h1 class="detail-title">${title}</h1>
            <div class="detail-meta">${date ? date.replaceAll('-', '.') : ''}</div>
          </div>
          <div class="detail-body">${bodyHtml}</div>
          <div class="detail-nav">
            <div class="detail-nav__item" onclick="history.back()">
              <span class="detail-nav__label">목록</span>
              <span>공지사항으로 돌아가기</span>
            </div>
          </div>
          <a href="notice.html" class="detail-back">← 목록으로</a>
        `;
      } catch (err) {
        el.innerHTML = '<p>내용을 불러올 수 없습니다.</p>';
        console.error(err);
      }
    }

    loadDetail();
  </script>
</body>
</html>
